<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Gravity ZERO 回数券</title>
  <link rel="manifest" id="manifest-link" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="apple-mobile-web-app-title" content="G-ZERO 回数券">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#040d1f">
  <style>
    :root {
      color-scheme: dark;
      --bg: #040d1f;
      --panel: #1b1235;
      --accent: #4fd1ff;
      --accent-dim: #3a2a6b;
      --text: #e8edf4;
      --text-dim: #a79ad0;
      --danger: #ff6b6b;
      --success: #52e3a4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      background-color: var(--bg);
      background-image:
        radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.9), transparent 60%),
        radial-gradient(1.5px 1.5px at 80% 15%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1px 1px at 50% 65%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 90%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(1.5px 1.5px at 45% 10%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 25% 40%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(1.5px 1.5px at 5% 70%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1px 1px at 95% 30%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1.5px 1.5px at 65% 5%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1px 1px at 20% 95%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(ellipse at 25% 20%, rgba(37, 99, 235, 0.35), transparent 55%),
        radial-gradient(ellipse at 80% 75%, rgba(14, 116, 208, 0.35), transparent 55%),
        linear-gradient(160deg, #0a1830 0%, #040d1f 55%, #01040c 100%);
      background-repeat: repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, no-repeat, no-repeat, no-repeat;
      background-size: 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, auto, auto, auto;
      background-attachment: fixed;
    }
    .title-logo {
      display: block;
      width: 100vw;
      max-width: 100vw;
      height: auto;
      margin: 8px calc(50% - 50vw) 6px;
    }
    .purchaser-name {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fafad2;
      border: 1px solid rgba(147, 51, 234, 0.3);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 0 45px rgba(140, 82, 255, 0.25);
    }
    .gravity-number {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      margin: 4px 0;
      background: linear-gradient(135deg, #ffd700 0%, #fffbe6 25%, #ffd700 50%, #b8860b 75%, #ffd700 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    .gravity-label {
      font-size: 32px;
      font-weight: 800;
      color: #0000ff;
      letter-spacing: 0.1em;
      text-align: center;
    }
    .gauge {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin: 20px 0;
    }
    .gauge-dot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .gauge-dot .circle {
      width: 100%;
      aspect-ratio: 1;
      clip-path: polygon(0% 0%, 65% 0%, 100% 50%, 65% 100%, 0% 100%);
      background: rgba(147, 51, 234, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #6b5b95;
    }
    .gauge-dot.passed .circle {
      background: var(--accent-dim);
      color: var(--text);
    }
    .gauge-dot.current .circle {
      background: #6495ed;
      color: #05131a;
      font-weight: 700;
      transform: scale(1.15);
    }
    .remaining {
      font-size: 15px;
      color: #6b5b95;
      margin-bottom: 20px;
    }
    .remaining strong {
      color: #2d2140;
      font-size: 20px;
    }
    .expiry-info {
      font-size: 12px;
      font-weight: 700;
      color: #ff0000;
      margin: -14px 0 6px;
    }

    .speed-clear-progress {
      font-size: 13px;
      color: #7c3aed;
      margin: -6px 0 20px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button.consume {
      padding: 16px 0;
      border-radius: 14px;
      border: none;
      background: #ff69b4;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button.consume .consume-top {
      display: block;
      line-height: 1.1;
      white-space: nowrap;
    }
    button.consume .consume-bottom {
      display: block;
      line-height: 1.1;
    }
    button.consume .consume-count {
      font-size: 2em;
    }
    button.consume:disabled {
      background: #ede9f7;
      color: #ab9dc9;
      cursor: not-allowed;
    }
    .share-button {
      margin-top: 12px;
      width: 100%;
      padding: 12px 0;
      border-radius: 12px;
      border: 1px solid rgba(147, 51, 234, 0.4);
      background: transparent;
      color: #4a3b72;
      font-size: 14px;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #6b5b95;
    }
    .message.error { color: #dc2626; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--panel);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .modal p { font-size: 16px; margin-bottom: 20px; }
    .modal .row { display: flex; gap: 12px; }
    .modal button {
      flex: 1;
      padding: 12px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
    .modal .cancel { background: #232a38; color: var(--text); }
    .modal .confirm { background: var(--accent); color: #05131a; font-weight: 700; }

    .celebrate .modal { max-width: 400px; }
    .celebrate h2 {
      color: var(--success);
      font-size: 26px;
      margin-bottom: 8px;
    }
    .speed-clear-headline {
      display: none;
    }
    .celebrate.speed-clear .speed-clear-headline {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: #ffd76a;
      text-shadow: 0 0 20px rgba(255, 215, 100, 0.9), 0 0 40px rgba(255, 180, 50, 0.6);
      margin-bottom: 10px;
      letter-spacing: 0.03em;
      animation: speedClearPulse 1.1s ease-in-out infinite;
    }
    .celebrate.speed-clear h2 {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    @keyframes speedClearPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }
    .celebrate .next-step {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    #warp-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #warp-canvas.show { opacity: 1; }

    .warp-title {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 92vw;
      transform: translate(-50%, -50%) scale(0.4);
      font-size: clamp(26px, 11vw, 60px);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 0 18px rgba(180, 140, 255, 0.9), 0 0 36px rgba(79, 209, 255, 0.7);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      z-index: 501;
      transition: transform 1.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
    }
    .warp-title.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 600;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #confetti-canvas.show { opacity: 1; }

    .loading .modal {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      max-width: 240px;
      padding: 20px 28px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img class="title-logo" src="./title-logo.jpg" alt="Gravity ZERO 回数券">
  <div class="purchaser-name" id="purchaser-name"></div>

  <div class="card" id="main-card">
    <div class="gravity-label">GRAVITY</div>
    <div class="gravity-number" id="gravity-number">-</div>

    <div class="remaining">
      重力を振り切るまで あと<strong id="remaining-count">-</strong>回
    </div>

    <div class="expiry-info" id="expiry-info"></div>

    <div class="speed-clear-progress" id="speed-clear-progress"></div>

    <div class="gauge" id="gauge"></div>

    <div class="buttons" id="buttons"></div>

    <button class="share-button" id="share-button" style="display:none">🔗 友達にシェアする</button>

    <div class="message" id="message"></div>
  </div>

  <div class="overlay" id="confirm-overlay">
    <div class="modal">
      <p id="confirm-text">跳びますか?</p>
      <div class="row">
        <button class="cancel" id="confirm-cancel">キャンセル</button>
        <button class="confirm" id="confirm-ok">はい</button>
      </div>
    </div>
  </div>

  <div class="overlay loading show" id="loading-overlay">
    <div class="modal">
      <div class="spinner"></div>
      <span id="loading-text">あなたのチケットを発行しています…</span>
    </div>
  </div>

  <div class="overlay celebrate" id="celebrate-overlay">
    <div class="modal">
      <div class="speed-clear-headline">⚡ スピードクリア達成!!</div>
      <h2>🎉 重力離脱!<br>達成おめでとうございます!</h2>
      <p id="celebrate-message"></p>
      <div class="next-step">
        次回のご来店もお待ちしております。<br>
        店頭スタッフまでお声がけください。
      </div>
      <div class="row" style="margin-top: 20px;">
        <button class="confirm" id="celebrate-close" style="flex:none; padding: 12px 24px;">閉じる</button>
      </div>
    </div>
  </div>

  <canvas id="warp-canvas"></canvas>
  <div class="warp-title" id="warp-title">Gravity ZERO</div>
  <canvas id="confetti-canvas"></canvas>

  <script>
    var API_BASE = 'https://script.google.com/macros/s/AKfycbx22R7ugfVC9Yl_HR0_Z_6lNIv1-AFQ5Y7qooSPtBQhkm93nnArRtL15ohoOTWbdUNa/exec';

    var urlParams = new URLSearchParams(window.location.search);
    var ticketId = urlParams.get('tid') || '';
    var shareToken = urlParams.get('tk') || '';

    // このページ専用のマニフェストを動的生成し、ホーム画面のアイコンから
    // 直接このチケットへ戻れるようにする(静的ファイルだと全員共通になってしまうため)。
    (function setupManifest() {
      var manifest = {
        name: 'G-ZERO 回数券',
        short_name: 'G-ZERO 回数券',
        start_url: './customer.html?tid=' + encodeURIComponent(ticketId) + '&tk=' + encodeURIComponent(shareToken),
        display: 'standalone',
        background_color: '#040d1f',
        theme_color: '#040d1f',
        icons: [
          { src: new URL('./icon-192.png', window.location.href).href, sizes: '192x192', type: 'image/png' },
          { src: new URL('./icon-512.png', window.location.href).href, sizes: '512x512', type: 'image/png' }
        ]
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      document.getElementById('manifest-link').href = URL.createObjectURL(blob);
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    }

    var pendingConsumeCount = null;
    var motivationMessages = [
      'バランス感覚が磨かれてきていますね!',
      '次はさらに上のレベルを目指しましょう!',
      '体幹が鍛えられてきましたね!',
      '心肺機能が向上してきましたね!'
    ];

    function $(id) { return document.getElementById(id); }

    function apiCall(action, params) {
      var url = new URL(API_BASE);
      url.searchParams.set('action', action);
      Object.keys(params || {}).forEach(function (key) {
        url.searchParams.set(key, params[key]);
      });
      return fetch(url.toString())
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data && data.error) throw new Error(data.error);
          return data;
        });
    }

    var warpCanvas = $('warp-canvas');
    var warpCtx = warpCanvas.getContext('2d');
    var warpParticles = [];
    var warpFlashTimes = [];
    var warpAnimationId = null;
    var warpStartTime = null;
    var warpClearTimer = null;
    var WARP_WAVES = 4;
    var WARP_WAVE_INTERVAL = 550;
    var WARP_PARTICLES_PER_WAVE = 140;
    var WARP_WAVE_LIFETIME = 1500;
    var WARP_DURATION = (WARP_WAVES - 1) * WARP_WAVE_INTERVAL + WARP_WAVE_LIFETIME;
    var WARP_COLORS = ['#4fd1ff', '#ff2fd1', '#b565f5', '#f9f871', '#52e3a4', '#ff6ec7'];

    function createWarpParticles() {
      var particles = [];
      warpFlashTimes = [];
      for (var w = 0; w < WARP_WAVES; w++) {
        var waveStart = w * WARP_WAVE_INTERVAL;
        warpFlashTimes.push(waveStart);
        for (var i = 0; i < WARP_PARTICLES_PER_WAVE; i++) {
          particles.push({
            angle: Math.random() * Math.PI * 2,
            speed: 4 + Math.random() * 11,
            width: 1 + Math.random() * 2.5,
            distance: 0,
            delay: waveStart + Math.random() * 200,
            color: WARP_COLORS[Math.floor(Math.random() * WARP_COLORS.length)]
          });
        }
      }
      return particles;
    }

    function drawWarpFlashes(elapsed, cx, cy) {
      warpFlashTimes.forEach(function (flashTime) {
        var flashElapsed = elapsed - flashTime;
        if (flashElapsed < 0 || flashElapsed > 400) return;
        var t = flashElapsed / 400;
        var radius = 10 + t * 240;
        var alpha = (1 - t) * 0.55;
        var gradient = warpCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        gradient.addColorStop(0, 'rgba(255,255,255,' + alpha + ')');
        gradient.addColorStop(0.4, 'rgba(180,140,255,' + (alpha * 0.6) + ')');
        gradient.addColorStop(1, 'rgba(180,140,255,0)');
        warpCtx.fillStyle = gradient;
        warpCtx.beginPath();
        warpCtx.arc(cx, cy, radius, 0, Math.PI * 2);
        warpCtx.fill();
      });
    }

    function stepWarp(timestamp) {
      if (!warpStartTime) warpStartTime = timestamp;
      var elapsed = timestamp - warpStartTime;
      var cx = warpCanvas.width / 2;
      var cy = warpCanvas.height / 2;

      warpCtx.fillStyle = 'rgba(5, 3, 21, 0.18)';
      warpCtx.fillRect(0, 0, warpCanvas.width, warpCanvas.height);

      warpCtx.globalCompositeOperation = 'lighter';
      drawWarpFlashes(elapsed, cx, cy);
      warpParticles.forEach(function (p) {
        var localElapsed = elapsed - p.delay;
        if (localElapsed <= 0) return;
        var prevDistance = p.distance;
        p.distance = localElapsed * p.speed * 0.05;
        var x0 = cx + Math.cos(p.angle) * prevDistance;
        var y0 = cy + Math.sin(p.angle) * prevDistance;
        var x1 = cx + Math.cos(p.angle) * p.distance;
        var y1 = cy + Math.sin(p.angle) * p.distance;

        warpCtx.strokeStyle = p.color;
        warpCtx.lineWidth = p.width;
        warpCtx.beginPath();
        warpCtx.moveTo(x0, y0);
        warpCtx.lineTo(x1, y1);
        warpCtx.stroke();
      });
      warpCtx.globalCompositeOperation = 'source-over';

      if (elapsed < WARP_DURATION) {
        warpAnimationId = requestAnimationFrame(stepWarp);
      } else {
        stopWarpEffect();
      }
    }

    function stopWarpEffect() {
      if (warpAnimationId) cancelAnimationFrame(warpAnimationId);
      warpAnimationId = null;
      warpCanvas.classList.remove('show');
      if (warpClearTimer) clearTimeout(warpClearTimer);
      warpClearTimer = setTimeout(function () {
        warpCtx.clearRect(0, 0, warpCanvas.width, warpCanvas.height);
      }, 500);
    }

    var warpTitleShowTimer = null;
    var warpTitleHideTimer = null;

    function playWarpEffect() {
      warpCanvas.width = window.innerWidth;
      warpCanvas.height = window.innerHeight;
      warpParticles = createWarpParticles();
      warpStartTime = null;
      if (warpAnimationId) cancelAnimationFrame(warpAnimationId);
      if (warpClearTimer) clearTimeout(warpClearTimer);
      warpCanvas.classList.add('show');
      warpAnimationId = requestAnimationFrame(stepWarp);

      var titleEl = $('warp-title');
      titleEl.classList.remove('show');
      if (warpTitleShowTimer) clearTimeout(warpTitleShowTimer);
      if (warpTitleHideTimer) clearTimeout(warpTitleHideTimer);
      warpTitleShowTimer = setTimeout(function () {
        titleEl.classList.add('show');
      }, WARP_WAVE_INTERVAL * 2);
      warpTitleHideTimer = setTimeout(function () {
        titleEl.classList.remove('show');
      }, WARP_DURATION + 300);
    }

    var confettiCanvas = $('confetti-canvas');
    var confettiCtx = confettiCanvas.getContext('2d');
    var confettiAnimationId = null;
    var confettiClearTimer = null;
    var confettiShowTimer = null;
    var CONFETTI_COUNT = 120;
    var CONFETTI_DURATION = 4000;
    var CONFETTI_COLORS = ['#4fd1ff', '#ff2fd1', '#b565f5', '#f9f871', '#52e3a4', '#ff6ec7', '#ffffff'];

    function createConfettiParticles() {
      var particles = [];
      for (var i = 0; i < CONFETTI_COUNT; i++) {
        particles.push({
          x: Math.random() * confettiCanvas.width,
          y: confettiCanvas.height + Math.random() * 200,
          size: 6 + Math.random() * 6,
          speed: 2 + Math.random() * 3,
          sway: Math.random() * 2 - 1,
          swayPhase: Math.random() * 1000,
          rotation: Math.random() * Math.PI,
          rotationSpeed: (Math.random() - 0.5) * 0.2,
          color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          delay: Math.random() * 800
        });
      }
      return particles;
    }

    function stepConfetti(timestamp, particles, startRef) {
      if (!startRef.time) startRef.time = timestamp;
      var elapsed = timestamp - startRef.time;
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      particles.forEach(function (p) {
        var localElapsed = elapsed - p.delay;
        if (localElapsed <= 0) return;
        p.y -= p.speed;
        p.x += Math.sin((localElapsed + p.swayPhase) / 300) * p.sway;
        p.rotation += p.rotationSpeed;

        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rotation);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        confettiCtx.restore();
      });

      if (elapsed < CONFETTI_DURATION) {
        confettiAnimationId = requestAnimationFrame(function (ts) { stepConfetti(ts, particles, startRef); });
      } else {
        confettiCanvas.classList.remove('show');
        confettiClearTimer = setTimeout(function () {
          confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }, 500);
      }
    }

    function playConfettiEffect(delay) {
      if (confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
      if (confettiClearTimer) clearTimeout(confettiClearTimer);
      if (confettiShowTimer) clearTimeout(confettiShowTimer);

      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      var particles = createConfettiParticles();
      var startRef = { time: null };

      confettiShowTimer = setTimeout(function () {
        confettiCanvas.classList.add('show');
        confettiAnimationId = requestAnimationFrame(function (ts) { stepConfetti(ts, particles, startRef); });
      }, delay || 0);
    }

    function renderGauge(currentGravity) {
      var gauge = $('gauge');
      gauge.innerHTML = '';
      for (var level = 7; level >= 0; level--) {
        var dot = document.createElement('div');
        dot.className = 'gauge-dot';
        if (level > currentGravity) dot.className += ' passed';
        if (level === currentGravity) dot.className += ' current';
        dot.innerHTML = '<div class="circle">' + level + '</div>';
        gauge.appendChild(dot);
      }
    }

    function renderButtons(status) {
      var buttons = $('buttons');
      buttons.innerHTML = '';
      if (status.status !== 'active') return;
      for (var count = 1; count <= status.maxShareMembers; count++) {
        var btn = document.createElement('button');
        btn.className = 'consume';
        btn.innerHTML = '<span class="consume-top"><span class="consume-count">' + count + '</span>回</span><span class="consume-bottom">楽しむ</span>';
        btn.disabled = count > status.remainingCount;
        (function (c) {
          btn.addEventListener('click', function () { openConfirm(c); });
        })(count);
        buttons.appendChild(btn);
      }
    }

    function renderExpiryInfo(status) {
      var el = $('expiry-info');
      if (!status.expiryDate) {
        el.textContent = '';
        return;
      }
      var d = new Date(status.expiryDate);
      el.textContent = '有効期限: ' + d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + 'まで';
    }

    function renderSpeedClearProgress(status) {
      var el = $('speed-clear-progress');
      if (status.status !== 'active' || !status.speedClearDeadline) {
        el.textContent = '';
        return;
      }
      var daysLeft = Math.ceil((new Date(status.speedClearDeadline) - new Date()) / (1000 * 60 * 60 * 24));
      el.textContent = daysLeft > 0 ? '⚡ スピードクリアまであと' + daysLeft + '日' : '';
    }

    function toKatakana(text) {
      return (text || '').replace(/[ぁ-ゖ]/g, function (ch) {
        return String.fromCharCode(ch.charCodeAt(0) + 0x60);
      });
    }

    function renderPurchaserName(status) {
      var el = $('purchaser-name');
      el.textContent = status.purchaserName ? 'ご利用者: ' + toKatakana(status.purchaserName) + ' 様' : '';
    }

    function renderStatus(status) {
      $('gravity-number').textContent = status.currentGravity;
      $('remaining-count').textContent = status.remainingCount;
      renderGauge(status.currentGravity);
      renderButtons(status);
      renderPurchaserName(status);
      renderExpiryInfo(status);
      renderSpeedClearProgress(status);
      $('share-button').style.display = status.status === 'active' ? 'block' : 'none';

      var message = $('message');
      message.className = 'message';
      if (status.status === 'completed') {
        message.textContent = 'この回数券は使い切りました。ご利用ありがとうございました。';
      } else if (status.status === 'expired') {
        message.className = 'message error';
        message.textContent = 'この回数券は有効期限が切れています。';
      } else {
        message.textContent = '';
      }
    }

    function showError(text) {
      var message = $('message');
      message.className = 'message error';
      message.textContent = text;
    }

    function openConfirm(count) {
      pendingConsumeCount = count;
      $('confirm-text').textContent = '「' + count + '回」楽しむでよろしいですか?';
      $('confirm-overlay').className = 'overlay show';
    }

    function closeConfirm() {
      pendingConsumeCount = null;
      $('confirm-overlay').className = 'overlay';
    }

    function showCelebration(result) {
      var message = motivationMessages[Math.floor(Math.random() * motivationMessages.length)];
      $('celebrate-message').textContent = message;

      if (result.speedClearAchieved) {
        $('celebrate-overlay').className = 'overlay celebrate speed-clear show';
        playWarpEffect();
        playConfettiEffect(WARP_DURATION + 300);
      } else {
        $('celebrate-overlay').className = 'overlay celebrate show';
        playConfettiEffect(0);
      }
    }

    $('share-button').addEventListener('click', function () {
      var shareUrl = window.location.href;
      var btn = $('share-button');
      if (navigator.share) {
        navigator.share({ title: 'G-ZERO 回数券', url: shareUrl }).catch(function () {});
        return;
      }
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl).then(function () {
          var original = btn.textContent;
          btn.textContent = 'コピーしました!';
          setTimeout(function () { btn.textContent = original; }, 2000);
        });
      }
    });

    $('confirm-cancel').addEventListener('click', closeConfirm);
    $('celebrate-close').addEventListener('click', function () {
      $('celebrate-overlay').className = 'overlay celebrate';
    });

    function showLoading(text) {
      $('loading-text').textContent = text;
      $('loading-overlay').className = 'overlay loading show';
    }

    function hideLoading() {
      $('loading-overlay').className = 'overlay loading';
    }

    $('confirm-ok').addEventListener('click', function () {
      var count = pendingConsumeCount;
      closeConfirm();
      showLoading('処理中...');
      apiCall('consume', { tid: ticketId, tk: shareToken, count: count })
        .then(function (result) {
          hideLoading();
          renderStatus(result);
          if (result.isCompleted) showCelebration(result);
        })
        .catch(function (error) {
          hideLoading();
          showError(error.message);
        });
    });

    if (!ticketId || !shareToken) {
      hideLoading();
      showError('チケット情報が見つかりません。QRコードから開き直してください。');
    } else {
      apiCall('status', { tid: ticketId, tk: shareToken })
        .then(function (status) {
          hideLoading();
          renderStatus(status);
          if (status.isCompleted) showCelebration(status);
        })
        .catch(function (error) {
          hideLoading();
          showError(error.message);
        });
    }
  </script>
</body>
</html>
